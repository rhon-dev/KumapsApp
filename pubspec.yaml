name: kumpas
description: "Filipino Sign Language Learning App with Real-time AI Feedback"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.0
  
  # Camera & Media
  camera: ^0.10.5
  image: ^4.0.0
  
  # ML Kit for Hand Detection
  google_mlkit_hand_pose_detection: ^0.1.0
  google_mlkit_commons: ^0.5.0
  
  # TFLite Model Inference
  tflite_flutter: ^0.10.0
  
  # UI & Design
  google_fonts: ^6.1.0
  
  # Utilities
  equatable: ^2.0.5
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
